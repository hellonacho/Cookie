<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Raycaster FPS</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #020202; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        canvas { background-color: #000; border: 4px solid #222; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #ui { position: absolute; top: 15px; left: 15px; color: #00ffcc; text-shadow: 2px 2px 4px black; font-size: 14px; pointer-events: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">NETWORK: <span id="status">CONNECTING...</span></div>
    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusEl = document.getElementById("status");

        const mapSize = 10;
        const tileSize = 64;

        // Expanded 10x10 map layout grid layout
        const mapLayout = 
            "1111111111" +
            "1000000001" +
            "1011001101" +
            "1010000101" +
            "1000110001" +
            "1000110001" +
            "1010000101" +
            "1011001101" +
            "1000000001" +
            "1111111111";

        function isWall(gridX, gridY) {
            if (gridX < 0 || gridX >= mapSize || gridY < 0 || gridY >= mapSize) return true;
            let index = Math.floor(gridY) * mapSize + Math.floor(gridX);
            return mapLayout.charAt(index) === "1";
        }

        // --- PROCEDURAL TEXTURE GENERATORS ---
        // Generates textures dynamically so no external image loading is required on ChromeOS
        function createWallTexture() {
            const texCanvas = document.createElement("canvas");
            texCanvas.width = 64; texCanvas.height = 64;
            const tCtx = texCanvas.getContext("2d");
            tCtx.fillStyle = "#5a5550"; tCtx.fillRect(0,0,64,64);
            tCtx.fillStyle = "#3a3530"; // Brick lines
            for(let y=0; y<64; y+=16) {
                tCtx.fillRect(0, y, 64, 2);
                let offset = (y % 32 === 0) ? 0 : 16;
                for(let x=offset; x<64; x+=32) tCtx.fillRect(x, y, 2, 16);
            }
            return tCtx.getImageData(0,0,64,64);
        }

        function createFloorTexture() {
            const texCanvas = document.createElement("canvas");
            texCanvas.width = 64; texCanvas.height = 64;
            const tCtx = texCanvas.getContext("2d");
            tCtx.fillStyle = "#22252a"; tCtx.fillRect(0,0,64,64);
            tCtx.strokeStyle = "#111317"; tCtx.lineWidth = 2;
            tCtx.strokeRect(0,0,64,64); tCtx.strokeRect(0,0,32,32); tCtx.strokeRect(32,32,32,32);
            return tCtx.getImageData(0,0,64,64);
        }

        function createCeilingTexture() {
            const texCanvas = document.createElement("canvas");
            texCanvas.width = 64; texCanvas.height = 64;
            const tCtx = texCanvas.getContext("2d");
            tCtx.fillStyle = "#0f111a"; tCtx.fillRect(0,0,64,64);
            tCtx.fillStyle = "#ffffff"; // Random noise stars
            for(let i=0; i<15; i++) tCtx.fillRect(Math.random()*64, Math.random()*64, 1, 1);
            return tCtx.getImageData(0,0,64,64);
        }

        const wallTex = createWallTexture();
        const floorTex = createFloorTexture();
        const ceilTex = createCeilingTexture();
        const screenBuffer = ctx.createImageData(canvas.width, canvas.height);

        // Multiplayer Setup
        const myId = "user_" + Math.floor(Math.random() * 10000);
        let remotePlayers = {};
        let socket = null;

        try {
            socket = new WebSocket("wss://://piesocket.com");
            socket.onopen = function() { statusEl.innerText = "MULTIPLAYER ACTIVE (ID: " + myId + ")"; statusEl.style.color = "#00ffcc"; };
            socket.onerror = function() { statusEl.innerText = "CONNECTION ERROR (FALLBACK TO OFFLINE)"; statusEl.style.color = "#ff3333"; };
            socket.onclose = function() { statusEl.innerText = "OFFLINE (SINGLE PLAYER)"; statusEl.style.color = "#ff9900"; };
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.id !== myId) { remotePlayers[data.id] = data; }
            };
        } catch (e) { statusEl.innerText = "NETWORK BLOCKED"; }

        let muzzleFlashTimer = 0;
        let walkCycle = 0;
        let headBobY = 0;

        const player = {
            x: 100, y: 100, angle: 0.8,
            speed: 2.5, rotSpeed: 0.05, fov: Math.PI / 3
        };

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener("mousedown", () => {
            if (muzzleFlashTimer <= 0) {
                muzzleFlashTimer = 5;
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ id: myId, x: player.x, y: player.y, shooting: true }));
                }
            }
        });

        setInterval(() => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ id: myId, x: player.x, y: player.y, shooting: muzzleFlashTimer > 0 }));
            }
        }, 50);

        function update() {
            let isMoving = false;
            if (keys["a"] || keys["arrowleft"])  player.angle -= player.rotSpeed;
            if (keys["d"] || keys["arrowright"]) player.angle += player.rotSpeed;

            let moveX = 0, moveY = 0;
            if (keys["w"] || keys["arrowup"]) {
                moveX = Math.cos(player.angle) * player.speed;
                moveY = Math.sin(player.angle) * player.speed;
                isMoving = true;
            }
            if (keys["s"] || keys["arrowdown"]) {
                moveX = -Math.cos(player.angle) * player.speed;
                moveY = -Math.sin(player.angle) * player.speed;
                isMoving = true;
            }

            let newX = player.x + moveX;
            let newY = player.y + moveY;

            if (!isWall(Math.floor(newX / tileSize), Math.floor(player.y / tileSize))) player.x = newX;
            if (!isWall(Math.floor(player.x / tileSize), Math.floor(newY / tileSize))) player.y = newY;

            if (isMoving) {
                walkCycle += 0.28;
                headBobY = Math.sin(walkCycle) * 5;
            } else {
                headBobY = Math.sin(Date.now() * 0.002) * 1;
            }

            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
        }

        function draw() {
            const zBuffer = [];
            const halfHeight = canvas.height / 2;

            // --- FLOOR AND CEILING TEXTURE MAPPING (PER-PIXEL RENDER) ---
            for (let y = 0; y < canvas.height; y++) {
                let isFloor = y > halfHeight + headBobY;
                let p = isFloor ? (y - halfHeight - headBobY) : (halfHeight - y + headBobY);
                
                if (p === 0) continue;

                // Calculate distance based on perspective angle projection
                let straightDist = (tileSize * halfHeight) / p;

                for (let x = 0; x < canvas.width; x++) {
                    let rayAngle = (player.angle - player.fov / 2) + (x / canvas.width) * player.fov;
                    
                    // Correcting fish-eye effect distortion
                    let distance = straightDist / Math.cos(rayAngle - player.angle);

                    let mapX = player.x + Math.cos(rayAngle) * distance;
                    let mapY = player.y + Math.sin(rayAngle) * distance;

                    let tx = Math.floor(mapX) & 63;
                    let ty = Math.floor(mapY) & 63;

                    let texIndex = (ty * 64 + tx) * 4;
                    let bufIndex = (y * canvas.width + x) * 4;

                    let srcTex = isFloor ? floorTex : ceilTex;

                    // Real-time linear exponential depth shader (Fog implementation)
                    let fog = Math.min(1, distance / 450); 
                    
                    screenBuffer.data[bufIndex]     = srcTex.data[texIndex]     * (1 - fog); // Red
                    screenBuffer.data[bufIndex + 1] = srcTex.data[texIndex + 1] * (1 - fog); // Green
                    screenBuffer.data[bufIndex + 2] = srcTex.data[texIndex + 2] * (1 - fog); // Blue
                    screenBuffer.data[bufIndex + 3] = 255;                                  // Alpha
                }
            }

            // --- WALL RENDERING WITH SYSTEM-LEVEL DEPTH LIGHTING ---
            for (let x = 0; x < canvas.width; x++) {
                let rayAngle = (player.angle - player.fov / 2) + (x / canvas.width) * player.fov;
                let distance = 0;
                let hitWall = false;
                let cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);
                let wallX = 0, wallY = 0;

                while (!hitWall && distance < 500) {
                    distance += 1.0;
                    wallX = player.x + cos * distance;
                    wallY = player.y + sin * distance;
                    if (isWall(Math.floor(wallX / tileSize), Math.floor(wallY / tileSize))) hitWall = true;
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[x] = correctedDist;

                let wallHeight = (tileSize * canvas.height) / correctedDist;
                let wallTop = Math.floor(halfHeight - (wallHeight / 2) + headBobY);
Use code with caution.let wallBottom = Math.floor(halfHeight + (wallHeight / 2) + headBobY);// Determine precise texture slice column intersection mappinglet textureX = Math.floor(wallX + wallY) % 64;let drawTop = Math.max(0, wallTop);let drawBottom = Math.min(canvas.height, wallBottom);let fog = Math.min(1, correctedDist / 400);for (let y = drawTop; y < drawBottom; y++) {let wallYTex = Math.floor(((y - wallTop) / wallHeight) * 64);let texIndex = (wallYTex * 64 + textureX) * 4;let bufIndex = (y * canvas.width + x) * 4;screenBuffer.data[bufIndex]     = wallTex.data[texIndex]     * (1 - fog);screenBuffer.data[bufIndex + 1] = wallTex.data[texIndex + 1] * (1 - fog);screenBuffer.data[bufIndex + 2] = wallTex.data[texIndex + 2] * (1 - fog);}}// Write all pixel computations from the screen buffer out to the display canvas viewctx.putImageData(screenBuffer, 0, 0);// --- RENDER MULTIPLAYER OPPONENTS ---for (let pId in remotePlayers) {let p = remotePlayers[pId];let ex = p.x - player.x, ey = p.y - player.y;let spriteAngle = Math.atan2(ey, ex) - player.angle;while (spriteAngle < -Math.PI) spriteAngle += Math.PI * 2;while (spriteAngle > Math.PI) spriteAngle -= Math.PI * 2;if (Math.abs(spriteAngle) < player.fov) {let spriteDist = Math.sqrt(exex + eyey);let spriteSize = (tileSize * canvas.height) / spriteDist;let screenX = (canvas.width / 2) + Math.tan(spriteAngle) * (canvas.width / 2) - (spriteSize / 2);let screenY = halfHeight - (spriteSize / 2) + headBobY;let checkColumn = Math.floor(screenX + spriteSize / 2);if (checkColumn >= 0 && checkColumn < canvas.width && spriteDist < zBuffer[checkColumn]) {// Render Enemy Billboardctx.fillStyle = p.shooting ? "#ff3333" : "#00ffcc";ctx.beginPath();ctx.arc(screenX + spriteSize/2, screenY + spriteSize/2, spriteSize/4, 0, Math.PI * 2);ctx.fill();// Atmospheric lighting shadow below opponent spritectx.fillStyle = "rgba(0,0,0,0.4)";ctx.fillRect(screenX + spriteSize/4, screenY + spriteSize - 5, spriteSize/2, 5);}}}// --- HUD DESIGN: ADVANCED WEAPON BARREL AND MUZZLE FLASH ---let gunYOffset = headBobY * 0.6;let gunX = canvas.width / 2;let gunY = canvas.height - 20 + gunYOffset;if (muzzleFlashTimer > 0) {let gradient = ctx.createRadialGradient(gunX, gunY - 70, 5, gunX, gunY - 70, 45);gradient.addColorStop(0, '#ffffff');gradient.addColorStop(0.2, '#ffcc00');gradient.addColorStop(1, 'rgba(255,50,0,0)');ctx.fillStyle = gradient;ctx.beginPath(); ctx.arc(gunX, gunY - 70, 45, 0, Math.PI * 2); ctx.fill();}// Styled Weapon Chassis Graphicctx.fillStyle = "#2c3e50"; ctx.fillRect(gunX - 20, gunY - 55, 40, 60);ctx.fillStyle = "#1a252f"; ctx.fillRect(gunX - 8, gunY - 70, 16, 20);ctx.fillStyle = "#00ffcc"; ctx.fillRect(gunX - 2, gunY - 45, 4, 30); // Weapon neon core// --- REAL-TIME GRAPHICAL HUD MINI-MAP LAYER ---const mScale = 10; // Miniature projection sizing factorconst mOffsetObj = { x: canvas.width - (mapSize * mScale) - 15, y: 15 };ctx.fillStyle = "rgba(0, 0, 0, 0.65)";ctx.fillRect(mOffsetObj.x - 5, mOffsetObj.y - 5, (mapSize * mScale) + 10, (mapSize * mScale) + 10);ctx.strokeStyle = "#333"; ctx.lineWidth = 2;ctx.strokeRect(mOffsetObj.x - 5, mOffsetObj.y - 5, (mapSize * mScale) + 10, (mapSize * mScale) + 10);for (let y = 0; y < mapSize; y++) {for (let x = 0; x < mapSize; x++) {if (isWall(x, y)) {ctx.fillStyle = "#444a54";ctx.fillRect(mOffsetObj.x + x * mScale, mOffsetObj.y + y * mScale, mScale - 1, mScale - 1);}}}// Draw player position arrow pointer icon inside map representationlet pMapX = mOffsetObj.x + (player.x / tileSize) * mScale;let pMapY = mOffsetObj.y + (player.y / tileSize) * mScale;ctx.fillStyle = "#ff3366";ctx.beginPath();ctx.arc(pMapX, pMapY, 3.5, 0, Math.PI * 2);ctx.fill();// Draw directional looking line vector onto mini-map interface layerctx.strokeStyle = "#ff3366"; ctx.lineWidth = 1.5;ctx.beginPath(); ctx.moveTo(pMapX, pMapY);ctx.lineTo(pMapX + Math.cos(player.angle) * 8, pMapY + Math.sin(player.angle) * 8);ctx.stroke();}function gameLoop() {update();draw();requestAnimationFrame(gameLoop);}gameLoop();
