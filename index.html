<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 3D Multiplayer Raycaster</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #05070a; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        canvas { background-color: #111; border: 4px solid #00ffcc; box-shadow: 0 0 30px rgba(0,255,204,0.2); }
        #ui { position: absolute; top: 15px; left: 15px; color: #00ffcc; text-shadow: 2px 2px 4px black; font-size: 14px; pointer-events: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">GITHUB LOBBY: <span id="status">INITIALIZING SECURE WEB NETWORKING...</span></div>
    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusEl = document.getElementById("status");

        const mapSize = 8;
        const tileSize = 64;
        const mapLayout = 
            "11111111" +
            "10000001" +
            "10100101" +
            "10000001" +
            "10000001" +
            "10100101" +
            "10000001" +
            "11111111";

        function isWall(gridX, gridY) {
            if (gridX < 0 || gridX >= mapSize || gridY < 0 || gridY >= mapSize) return true;
            let index = Math.floor(gridY) * mapSize + Math.floor(gridX);
            return mapLayout.charAt(index) === "1";
        }

        const player = {
            x: 128, y: 128, angle: 0.0,
            speed: 3.0, rotSpeed: 0.05, fov: Math.PI / 3
        };

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        const myId = "git_user_" + Math.floor(Math.random() * 10000);
        let remotePlayers = {};
        let socket = null;

        function connectNetwork() {
            try {
                // FIXED: Explicitly using a secure public test broker that allows HTTPS connections
                socket = new WebSocket("wss://echo.websocket.org");
                
                socket.onopen = function() {
                    statusEl.innerText = "ONLINE LOBBY ACTIVE (ID: " + myId + ")";
                    statusEl.style.color = "#00ffcc";
                };
                socket.onerror = function() { useOfflineFallback("SSL CONNECTION REJECTED"); };
                socket.onclose = function() { useOfflineFallback("DISCONNECTED FROM LOBBY"); };
                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data && data.id && data.id !== myId) { remotePlayers[data.id] = data; }
                    } catch(err) {}
                };
            } catch (e) {
                useOfflineFallback("HTTPS BLOCKED NON-SSL CONTENT");
            }
        }

        function useOfflineFallback(reason) {
            statusEl.innerText = "OFFLINE TEST MODE (" + reason + ")";
            statusEl.style.color = "#ff9900";
            socket = null;
        }

        connectNetwork();

        let muzzleFlashTimer = 0;
        let walkCycle = 0;
        let headBobY = 0;

        canvas.addEventListener("mousedown", () => {
            if (muzzleFlashTimer <= 0) {
                muzzleFlashTimer = 5;
                sendNetworkData(true);
            }
        });

        function sendNetworkData(isShooting) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ id: myId, x: player.x, y: player.y, shooting: isShooting }));
            }
        }

        setInterval(() => sendNetworkData(muzzleFlashTimer > 0), 100);

        function update() {
            let isMoving = false;
            if (keys["a"] || keys["arrowleft"])  player.angle -= player.rotSpeed;
            if (keys["d"] || keys["arrowright"]) player.angle += player.rotSpeed;

            let moveX = 0, moveY = 0;
            if (keys["w"] || keys["arrowup"]) {
                moveX = Math.cos(player.angle) * player.speed;
                moveY = Math.sin(player.angle) * player.speed;
                isMoving = true;
            }
            if (keys["s"] || keys["arrowdown"]) {
                moveX = -Math.cos(player.angle) * player.speed;
                moveY = -Math.sin(player.angle) * player.speed;
                isMoving = true;
            }

            let newX = player.x + moveX;
            let newY = player.y + moveY;

            if (!isWall(Math.floor(newX / tileSize), Math.floor(player.y / tileSize))) player.x = newX;
            if (!isWall(Math.floor(player.x / tileSize), Math.floor(newY / tileSize))) player.y = newY;

            if (isMoving) {
                walkCycle += 0.3;
                headBobY = Math.sin(walkCycle) * 5; [1.21]
            } else {
                headBobY = Math.sin(Date.now() * 0.002) * 1;
            }

            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
        }

        function draw() {
            ctx.fillStyle = "#0c1015"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#11161f"; ctx.fillRect(0, 0, canvas.width, canvas.height / 2 + headBobY);
            ctx.fillStyle = "#1a1310"; ctx.fillRect(0, canvas.height / 2 + headBobY, canvas.width, canvas.height / 2 - headBobY);

            const zBuffer = [];
            const numRays = canvas.width;
            const startAngle = player.angle - player.fov / 2;

            for (let i = 0; i < numRays; i++) {
                let rayAngle = startAngle + (i / numRays) * player.fov;
                let distance = 0;
                let hitWall = false;
                let cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);

                while (!hitWall && distance < 500) {
                    distance += 2.0;
                    if (isWall(Math.floor((player.x + cos * distance) / tileSize), Math.floor((player.y + sin * distance) / tileSize))) {
                        hitWall = true;
                    }
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[i] = correctedDist;

                let wallHeight = (tileSize * canvas.height) / correctedDist;
                if (wallHeight > canvas.height) wallHeight = canvas.height;
                let wallTop = (canvas.height / 2) - (wallHeight / 2) + headBobY;

                let shade = Math.floor(200 - (correctedDist * 0.4));
                shade = Math.max(20, Math.min(220, shade));

                ctx.fillStyle = `rgb(${shade}, ${Math.floor(shade * 0.7)}, ${Math.floor(shade * 0.5)})`;
                ctx.fillRect(i, wallTop, 1, wallHeight);
            }

            // Weapon rendering
            let gunYOffset = headBobY * 0.6;
            let gunX = canvas.width / 2;
            let gunY = canvas.height - 20 + gunYOffset;

            if (muzzleFlashTimer > 0) {
                ctx.fillStyle = "#ffaa00";
                ctx.beginPath(); ctx.arc(gunX, gunY - 65, 25, 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(gunX - 12, gunY - 50, 24, 60);
            ctx.fillStyle = "#34495e"; ctx.fillRect(gunX - 5, gunY - 65, 10, 15);

            // Mini-map rendering
            const mScale = 12; 
            const mOffset = { x: canvas.width - (mapSize * mScale) - 15, y: 15 };
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(mOffset.x - 4, mOffset.y - 4, (mapSize * mScale) + 8, (mapSize * mScale) + 8);

            for (let y = 0; y < mapSize; y++) {
                for (let x = 0; x < mapSize; x++) {
                    ctx.fillStyle = isWall(x, y) ? "#00ffcc" : "#11151d";
                    ctx.fillRect(mOffset.x + (x * mScale), mOffset.y + (y * mScale), mScale - 1, mScale - 1);
                }
            }

            let pMapX = mOffset.x + (player.x / (mapSize * tileSize)) * (mapSize * mScale);
            let pMapY = mOffset.y + (player.y / (mapSize * tileSize)) * (mapSize * mScale);
            ctx.fillStyle = "#ff3366"; ctx.beginPath(); ctx.arc(pMapX, pMapY, 4, 0, Math.PI * 2); ctx.fill();

            ctx.strokeStyle = "#ff3366"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(pMapX, pMapY);
            ctx.lineTo(pMapX + Math.cos(player.angle) * 10, pMapY + Math.sin(player.angle) * 10); ctx.stroke();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
