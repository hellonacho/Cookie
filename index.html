<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer FPS Game</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        canvas { background-color: #000; border: 4px solid #555; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const mapSize = 8;
        const tileSize = 64;

        function isWall(gridX, gridY) {
            if (gridX < 0 || gridX >= mapSize || gridY < 0 || gridY >= mapSize) return true;
            if (gridX === 0 || gridX === 7 || gridY === 0 || gridY === 7) return true;
            if (gridX === 3 && gridY === 3) return true;
            if (gridX === 4 && gridY === 5) return true;
            return false;
        }

        // Generate a random unique ID for this player session
        const myId = "player_" + Math.floor(Math.random() * 100000);
        let remotePlayers = {}; // Tracks other online players

        // CONNECT TO FREE CLOUD MULTIPLAYER SERVERS
        // Using an unblocked community trial ID specifically for education/testing
        const socket = new WebSocket("wss://://piesocket.com"); [1.4]

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            // Ignore messages sent by ourselves
            if (data.id !== myId) {
                remotePlayers[data.id] = data; // Add or update peer location
            }
        };

        let score = 0;
        let muzzleFlashTimer = 0;

        const player = {
            x: 150, y: 150, angle: 0.5,
            speed: 3, rotSpeed: 0.05, fov: Math.PI / 3
        };

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener("click", () => {
            if (muzzleFlashTimer <= 0) {
                muzzleFlashTimer = 5;
            }
        });

        // Broadcast player coordinates to the cloud network 20 times per second
        setInterval(() => {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    id: myId,
                    x: player.x,
                    y: player.y
                }));
            }
        }, 50);

        function update() {
            if (keys["a"] || keys["arrowleft"])  player.angle -= player.rotSpeed;
            if (keys["d"] || keys["arrowright"]) player.angle += player.rotSpeed;

            let moveX = 0, moveY = 0;
            if (keys["w"] || keys["arrowup"]) {
                moveX = Math.cos(player.angle) * player.speed;
                moveY = Math.sin(player.angle) * player.speed;
            }
            if (keys["s"] || keys["arrowdown"]) {
                moveX = -Math.cos(player.angle) * player.speed;
                moveY = -Math.sin(player.angle) * player.speed;
            }

            let newX = player.x + moveX;
            let newY = player.y + moveY;

            if (!isWall(Math.floor(newX / tileSize), Math.floor(player.y / tileSize))) player.x = newX;
            if (!isWall(Math.floor(player.x / tileSize), Math.floor(newY / tileSize))) player.y = newY;

            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Sky & Floor
            ctx.fillStyle = "#1a2530"; ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
            ctx.fillStyle = "#2d1f10"; ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            const zBuffer = [];
            const numRays = canvas.width;
            const startAngle = player.angle - player.fov / 2;

            // Render 3D Walls
            for (let i = 0; i < numRays; i++) {
                let rayAngle = startAngle + (i / numRays) * player.fov;
                let distance = 0;
                let hitWall = false;
                let cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);

                while (!hitWall && distance < 500) {
                    distance += 2;
                    let cx = Math.floor((player.x + cos * distance) / tileSize);
                    let cy = Math.floor((player.y + sin * distance) / tileSize);
                    if (isWall(cx, cy)) hitWall = true;
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[i] = correctedDist;

                let wallHeight = (tileSize * canvas.height) / correctedDist;
                if (wallHeight > canvas.height) wallHeight = canvas.height;
                let wallTop = (canvas.height / 2) - (wallHeight / 2);

                let shade = Math.floor(150 - (correctedDist * 0.35));
                ctx.fillStyle = `rgb(${Math.max(30, shade)}, ${Math.max(30, shade)}, ${Math.max(35, shade + 10)})`;
                ctx.fillRect(i, wallTop, 1, wallHeight);
            }

            // Render Connected Multiplayer Opponents
            for (let pId in remotePlayers) {
                let p = remotePlayers[pId];
                let ex = p.x - player.x;
                let ey = p.y - player.y;

                let spriteAngle = Math.atan2(ey, ex) - player.angle;
                while (spriteAngle < -Math.PI) spriteAngle += Math.PI * 2;
                while (spriteAngle > Math.PI) spriteAngle -= Math.PI * 2;

                if (Math.abs(spriteAngle) < player.fov) {
                    let spriteDist = Math.sqrt(ex*ex + ey*ey);
                    let spriteSize = (tileSize * canvas.height) / spriteDist;
                    let screenX = (canvas.width / 2) + Math.tan(spriteAngle) * (canvas.width / 2) - (spriteSize / 2);
                    let screenY = (canvas.height / 2) - (spriteSize / 2);
                    let checkColumn = Math.floor(screenX + spriteSize / 2);

                    if (checkColumn >= 0 && checkColumn < canvas.width && spriteDist < zBuffer[checkColumn]) {
                        ctx.fillStyle = "#3366ff"; // Bright blue multiplayer rival orb
                        ctx.beginPath();
                        ctx.arc(screenX + spriteSize/2, screenY + spriteSize/2, spriteSize/4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // HUD Overlay
            ctx.fillStyle = "rgba(0, 255, 0, 0.4)";
            ctx.fillRect(canvas.width / 2 - 5, canvas.height / 2 - 1, 10, 2);
            ctx.fillRect(canvas.width / 2 - 1, canvas.height / 2 - 5, 2, 10);
            ctx.fillStyle = "#00ff00";
            ctx.font = "16px monospace";
            ctx.fillText("MULTIPLAYER READY", 20, 30);

            // Gun Render
            let weaponBob = (keys["w"] || keys["s"] || keys["a"] || keys["d"]) ? Math.sin(Date.now() * 0.012) * 5 : 0;
            if (muzzleFlashTimer > 0) {
                ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height/2); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            }
            ctx.fillStyle = "#555"; ctx.fillRect(canvas.width / 2 - 15, canvas.height - 70 + weaponBob, 30, 70);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop); [1.34]
        }
        gameLoop();
    </script>
</body>
</html>
