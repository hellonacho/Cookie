<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Raycaster FPS</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #050505; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        canvas { background-color: #000; border: 4px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.9); image-rendering: pixelated; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const mapSize = 8;
        const tileSize = 64;

        // String map template - Bypasses all data array scanning blocks completely!
        const mapLayout = 
            "11111111" +
            "10000001" +
            "10000001" +
            "10011001" +
            "10000101" +
            "10000001" +
            "10000001" +
            "11111111";

        function isWall(gridX, gridY) {
            if (gridX < 0 || gridX >= mapSize || gridY < 0 || gridY >= mapSize) return true;
            // Pull character directly out of text string by cell position index
            let index = gridY * mapSize + gridX;
            return mapLayout.charAt(index) === "1";
        }

        // Multiplayer Cloud Integration
        const myId = "player_" + Math.floor(Math.random() * 100000);
        let remotePlayers = {};
        const socket = new WebSocket("wss://://piesocket.com"); [1.4]

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.id !== myId) { remotePlayers[data.id] = data; }
        };

        // Realism & Gameplay State
        let muzzleFlashTimer = 0;
        let walkCycle = 0;
        let headBobY = 0;
        let isMoving = false;
        let bloodOverlayTimer = 0;

        const player = {
            x: 150, y: 150, angle: 0.5,
            speed: 2.2, rotSpeed: 0.045, fov: Math.PI / 3
        };

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener("click", () => {
            if (muzzleFlashTimer <= 0) {
                muzzleFlashTimer = 6;
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ id: myId, x: player.x, y: player.y, shooting: true }));
                }
            }
        });

        setInterval(() => {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    id: myId, x: player.x, y: player.y, shooting: muzzleFlashTimer > 0
                }));
            }
        }, 50);

        function update() {
            isMoving = false;
            if (keys["a"] || keys["arrowleft"])  player.angle -= player.rotSpeed;
            if (keys["d"] || keys["arrowright"]) player.angle += player.rotSpeed;

            let moveX = 0, moveY = 0;
            if (keys["w"] || keys["arrowup"]) {
                moveX = Math.cos(player.angle) * player.speed;
                moveY = Math.sin(player.angle) * player.speed;
                isMoving = true;
            }
            if (keys["s"] || keys["arrowdown"]) {
                moveX = -Math.cos(player.angle) * player.speed;
                moveY = -Math.sin(player.angle) * player.speed;
                isMoving = true;
            }

            let newX = player.x + moveX;
            let newY = player.y + moveY;

            if (!isWall(Math.floor(newX / tileSize), Math.floor(player.y / tileSize))) player.x = newX;
            if (!isWall(Math.floor(player.x / tileSize), Math.floor(newY / tileSize))) player.y = newY;

            // Head Bobbing Physics Equation
            if (isMoving) {
                walkCycle += 0.25;
                headBobY = Math.sin(walkCycle) * 4; // Moves camera up/down smoothly [1.21]
            } else {
                headBobY = Math.sin(Date.now() * 0.002) * 1; // Subtle idle breathing effect
            }

            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
            if (bloodOverlayTimer > 0) bloodOverlayTimer--;

            // Simulate damage if a remote player shoots near you
            for (let pId in remotePlayers) {
                if (remotePlayers[pId].shooting && Math.random() < 0.02) {
                    bloodOverlayTimer = 10;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Realistic Sky Gradient Shading
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height / 2);
            skyGrad.addColorStop(0, "#0a0f1d");
            skyGrad.addColorStop(1, "#232d42");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

            // Floor Shading
            ctx.fillStyle = "#1c140c";
            ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            const zBuffer = [];
            const numRays = canvas.width;
            const startAngle = player.angle - player.fov / 2;

            // Render Textured 3D Walls
            for (let i = 0; i < numRays; i++) {
                let rayAngle = startAngle + (i / numRays) * player.fov;
                let distance = 0;
                let hitWall = false;
                let cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);

                let wallExactX = 0;
                let wallExactY = 0;

                while (!hitWall && distance < 500) {
                    distance += 1;
                    wallExactX = player.x + cos * distance;
                    wallExactY = player.y + sin * distance;
                    if (isWall(Math.floor(wallExactX / tileSize), Math.floor(wallExactY / tileSize))) hitWall = true;
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[i] = correctedDist;

                let wallHeight = (tileSize * canvas.height) / correctedDist;
                if (wallHeight > canvas.height) wallHeight = canvas.height;
                
                let wallTop = (canvas.height / 2) - (wallHeight / 2) + headBobY;

                // Texture Mapping Math
                let textureX = Math.floor(wallExactX + wallExactY) % tileSize;

                let baseShade = Math.floor(140 - (correctedDist * 0.35));
                baseShade = Math.max(15, baseShade);

                // Draw brick pattern grid textures columns directly [1.32]
                if (textureX % 16 < 2 || (Math.floor(wallHeight) % 20 < 2)) {
                    ctx.fillStyle = `rgb(${Math.max(5, baseShade - 40)}, ${Math.max(5, baseShade - 40)}, ${Math.max(5, baseShade - 40)})`;
                } else {
                    ctx.fillStyle = `rgb(${baseShade + 20}, ${baseShade}, ${baseShade})`;
                }
                ctx.fillRect(i, wallTop, 1, wallHeight);
            }

            // Render Connected Multiplayer Opponents
            for (let pId in remotePlayers) {
                let p = remotePlayers[pId];
                let ex = p.x - player.x;
                let ey = p.y - player.y;

                let spriteAngle = Math.atan2(ey, ex) - player.angle;
                while (spriteAngle < -Math.PI) spriteAngle += Math.PI * 2;
                while (spriteAngle > Math.PI) spriteAngle -= Math.PI * 2;

                if (Math.abs(spriteAngle) < player.fov) {
                    let spriteDist = Math.sqrt(ex*ex + ey*ey);
                    let spriteSize = (tileSize * canvas.height) / spriteDist;
                    let screenX = (canvas.width / 2) + Math.tan(spriteAngle) * (canvas.width / 2) - (spriteSize / 2);
                    let screenY = (canvas.height / 2) - (spriteSize / 2) + headBobY;
                    let checkColumn = Math.floor(screenX + spriteSize / 2);

                    if (checkColumn >= 0 && checkColumn < canvas.width && spriteDist < zBuffer[checkColumn]) {
                        ctx.fillStyle = p.shooting ? "#ff3333" : "#22ccff"; 
                        ctx.beginPath();
                        ctx.arc(screenX + spriteSize/2, screenY + spriteSize/2, spriteSize/4, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = "#111";
                        ctx.fillRect(screenX + spriteSize/2 - (spriteSize/12), screenY + spriteSize/3, spriteSize/6, spriteSize/12);
                    }
                }
            }

            // Advanced Weapon Shading
            let gunYOffset = headBobY * 0.6;
            let gunX = canvas.width / 2;
            let gunY = canvas.height - 40 + gunYOffset;

            if (muzzleFlashTimer > 0) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.9)"; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(gunX, canvas.height/2 + headBobY); ctx.lineTo(gunX, canvas.height); ctx.stroke();
                
                let flashGrad = ctx.createRadialGradient(gunX, gunY - 50, 5, gunX, gunY - 50, 40);
                flashGrad.addColorStop(0, "#ffffff");
                flashGrad.addColorStop(0.3, "#00ffff");
                flashGrad.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = flashGrad; ctx.beginPath();
                ctx.arc(gunX, gunY - 50, 40, 0, Math.PI * 2); ctx.fill();
            }

            ctx.fillStyle = "#2d323f";
            ctx.beginPath();
            ctx.moveTo(gunX - 15, canvas.height);
            ctx.lineTo(gunX + 15, canvas.height);
            ctx.lineTo(gunX + 8, gunY - 45);
            ctx.lineTo(gunX - 8, gunY - 45);
            ctx.closePath(); ctx.fill();
