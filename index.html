<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Retro FPS Game</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        canvas { background-color: #000; border: 4px solid #555; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1 = Wall, 0 = Empty Corridor Space
        const map = [,
 ,
 ,
 ,
 ,
 ,
 ,
            [1,1,1,1,1,1,1,1]
        ];

        const mapWidth = 8;
        const mapHeight = 8;
        const tileSize = 64;

        // Game State Variables
        let score = 0;
        let muzzleFlashTimer = 0;

        // Player Configurations
        const player = {
            x: 100, y: 100, angle: 0.5,
            speed: 3, rotSpeed: 0.05, fov: Math.PI / 3
        };

        // Enemy Target Drone Variables
        const enemy = {
            x: 350, y: 250, size: 25,
            alive: true, speedX: 1.5, respawnTimer: 0
        };

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // Click to SHOOT (Bypasses school/work restrictions cleanly)
        canvas.addEventListener("click", () => {
            if (muzzleFlashTimer <= 0) {
                muzzleFlashTimer = 5; // Triggers flash animation for 5 frames
                shootWeapon();
            }
        });

        function shootWeapon() {
            if (!enemy.alive) return;

            // Calculate angle relative to the enemy position
            let dx = enemy.x - player.x;
            let dy = enemy.y - player.y;
            let angleToEnemy = Math.atan2(dy, dx);

            // Normalize angles to see if the crosshair lines up with the enemy
            let angleDiff = angleToEnemy - player.angle;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;

            // If the enemy is roughly in the center of our 60-degree FOV screen column
            if (Math.abs(angleDiff) < 0.15) {
                enemy.alive = false;
                score += 100;
                enemy.respawnTimer = 60; // Respawns after 1 second (60 frames)
            }
        }

        // Logic Loop
        function update() {
            // Movement Controls
            if (keys["a"] || keys["arrowleft"])  player.angle -= player.rotSpeed;
            if (keys["d"] || keys["arrowright"]) player.angle += player.rotSpeed;

            let moveX = 0, moveY = 0;
            if (keys["w"] || keys["arrowup"]) {
                moveX = Math.cos(player.angle) * player.speed;
                moveY = Math.sin(player.angle) * player.speed;
            }
            if (keys["s"] || keys["arrowdown"]) {
                moveX = -Math.cos(player.angle) * player.speed;
                moveY = -Math.sin(player.angle) * player.speed;
            }

            // Wall Collision Checks
            let newX = player.x + moveX, newY = player.y + moveY;
            if (map[Math.floor(player.y / tileSize)][Math.floor(newX / tileSize)] === 0) player.x = newX;
            if (map[Math.floor(newY / tileSize)][Math.floor(player.x / tileSize)] === 0) player.y = newY;

            // Move the Enemy Drone back and forth
            if (enemy.alive) {
                enemy.x += enemy.speedX;
                let nextGridX = Math.floor((enemy.x + (enemy.speedX > 0 ? 30 : -30)) / tileSize);
                if (map[Math.floor(enemy.y / tileSize)][nextGridX] === 1) {
                    enemy.speedX *= -1; // Reverse direction on wall hit
                }
            } else {
                enemy.respawnTimer--;
                if (enemy.respawnTimer <= 0) {
                    enemy.alive = true;
                    // Move to random empty space
                    enemy.x = 200 + Math.random() * 200;
                    enemy.y = 200 + Math.random() * 100;
                }
            }

            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
        }

        // Graphics Loop
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Environment
            ctx.fillStyle = "#1a2530"; ctx.fillRect(0, 0, canvas.width, canvas.height / 2); // Sky
            ctx.fillStyle = "#2d1f10"; ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2); // Floor

            // Z-Buffer array to track wall distances for accurate layered drawing
            const zBuffer = [];

            // 2. Render 3D Walls
            const numRays = canvas.width;
            const startAngle = player.angle - player.fov / 2;

            for (let i = 0; i < numRays; i++) {
                let rayAngle = startAngle + (i / numRays) * player.fov;
                let distance = 0;
                let hitWall = false;
                let cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);

                while (!hitWall && distance < 600) {
                    distance += 1.5;
                    let cx = Math.floor((player.x + cos * distance) / tileSize);
                    let cy = Math.floor((player.y + sin * distance) / tileSize);
                    if (cx < 0 || cx >= mapWidth || cy < 0 || cy >= mapHeight || map[cy][cx] > 0) hitWall = true;
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[i] = correctedDist; // Save distance value

                let wallHeight = (tileSize * canvas.height) / correctedDist;
                if (wallHeight > canvas.height) wallHeight = canvas.height;
                let wallTop = (canvas.height / 2) - (wallHeight / 2);

                let shade = Math.floor(160 - (correctedDist * 0.35));
                ctx.fillStyle = `rgb(${Math.max(20, shade)}, ${Math.max(20, shade)}, ${Math.max(25, shade + 10)})`;
                ctx.fillRect(i, wallTop, 1, wallHeight);
            }

            // 3. Render Enemy Sprite Billboards (Sprite projection math)
            if (enemy.alive) {
                let ex = enemy.x - player.x;
                let ey = enemy.y - player.y;

                let spriteAngle = Math.atan2(ey, ex) - player.angle;
                while (spriteAngle < -Math.PI) spriteAngle += Math.PI * 2;
                while (spriteAngle > Math.PI) spriteAngle -= Math.PI * 2;

                // Ensure sprite is inside camera view field
                if (Math.abs(spriteAngle) < player.fov) {
                    let spriteDist = Math.sqrt(ex*ex + ey*ey);
                    let spriteSize = (tileSize * canvas.height) / spriteDist;

                    // Screen position alignment calculations
                    let screenX = (canvas.width / 2) + Math.tan(spriteAngle) * (canvas.width / 2) - (spriteSize / 2);
                    let screenY = (canvas.height / 2) - (spriteSize / 2);

                    // Draw if sprite is closer than the wall behind it
                    let checkColumn = Math.floor(screenX + spriteSize / 2);
                    if (checkColumn >= 0 && checkColumn < canvas.width && spriteDist < zBuffer[checkColumn]) {
                        ctx.fillStyle = "#ff3333"; // Crimson drone color
                        ctx.beginPath();
                        ctx.arc(screenX + spriteSize/2, screenY + spriteSize/2, spriteSize/4, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Cyber-Eye details
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(screenX + spriteSize/2 - 2, screenY + spriteSize/2 - 2, 4, 4);
                    }
                }
            }

            // 4. Draw HUD (Crosshair & Score Overlay)
            ctx.fillStyle = "rgba(0, 255, 0, 0.5)"; // Cyber Green UI
            ctx.fillRect(canvas.width / 2 - 5, canvas.height / 2 - 1, 10, 2);
            ctx.fillRect(canvas.width / 2 - 1, canvas.height / 2 - 5, 2, 10);

            ctx.fillStyle = "#00ff00";
            ctx.font = "20px monospace";
            ctx.fillText(`SCORE: ${score}`, 20, 35);
            ctx.fillText("CLICK SCREEN TO BLAST", 20, 65);

            // 5. Blaster Art Display
            let weaponBob = (keys["w"] || keys["s"] || keys["a"] || keys["d"]) ? Math.sin(Date.now() * 0.012) * 5 : 0;
            
            // Draw Laser Blast Beam if flashing
            if (muzzleFlashTimer > 0) {
                ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height/2); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
                
                ctx.fillStyle = "#ffffff"; ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height - 90 + weaponBob, 25, 0, Math.PI * 2); ctx.fill();
            }

            // Metallic gun base geometry
            ctx.fillStyle = "#444455"; ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 20, canvas.height);
            ctx.lineTo(canvas.width / 2 + 20, canvas.height);
            ctx.lineTo(canvas.width / 2, canvas.height - 80 + weaponBob);
            ctx.closePath(); ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop); [1.34]
        }
        gameLoop();
    </script>
</body>
</html>
