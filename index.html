<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Raycaster FPS Game</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #0c0f12; display: flex; justify-content: center; align-items: center; font-family: monospace; }
        canvas { background-color: #111; border: 4px solid #00ffcc; box-shadow: 0 0 40px rgba(0,255,204,0.3); }
        #ui { position: absolute; top: 15px; left: 15px; color: #00ffcc; text-shadow: 2px 2px 4px black; font-size: 14px; pointer-events: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">NETWORK: <span id="status">CONNECTING...</span></div>
    <canvas id="gameCanvas" width="640" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const statusEl = document.getElementById("status");

        const mapSize = 10;
        const tileSize = 64;

        // Structured 10x10 grid with clear walls and corridors
        const mapLayout = 
            "1111111111" +
            "1000000001" +
            "1011001101" +
            "1010000101" +
            "1000110001" +
            "1000110001" +
            "1010000101" +
            "1011001101" +
            "1000000001" +
            "1111111111";

        function isWall(gridX, gridY) {
            if (gridX < 0 || gridX >= mapSize || gridY < 0 || gridY >= mapSize) return true;
            let index = Math.floor(gridY) * mapSize + Math.floor(gridX);
            return mapLayout.charAt(index) === "1";
        }

        // Multiplayer Setup
        const myId = "user_" + Math.floor(Math.random() * 10000);
        let remotePlayers = {};
        let socket = null;

        try {
            socket = new WebSocket("wss://://piesocket.com"); [1.4]
            socket.onopen = function() { statusEl.innerText = "MULTIPLAYER ACTIVE (ID: " + myId + ")"; statusEl.style.color = "#00ffcc"; };
            socket.onerror = function() { statusEl.innerText = "CONNECTION ERROR"; statusEl.style.color = "#ff3333"; };
            socket.onclose = function() { statusEl.innerText = "OFFLINE (SINGLE PLAYER)"; statusEl.style.color = "#ff9900"; };
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.id !== myId) { remotePlayers[data.id] = data; }
            };
        } catch (e) { statusEl.innerText = "NETWORK BLOCKED"; }

        let muzzleFlashTimer = 0;
        let walkCycle = 0;
        let headBobY = 0;

        // Placed safely in the open hallway zone
        const player = {
            x: 150, y: 150, angle: 0.8,
            speed: 3.0, rotSpeed: 0.06, fov: Math.PI / 3
        };

        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener("mousedown", () => {
            if (muzzleFlashTimer <= 0) {
                muzzleFlashTimer = 5;
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ id: myId, x: player.x, y: player.y, shooting: true }));
                }
            }
        });

        setInterval(() => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ id: myId, x: player.x, y: player.y, shooting: muzzleFlashTimer > 0 }));
            }
        }, 50);

        function update() {
            let isMoving = false;
            if (keys["a"] || keys["arrowleft"])  player.angle -= player.rotSpeed;
            if (keys["d"] || keys["arrowright"]) player.angle += player.rotSpeed;

            let moveX = 0, moveY = 0;
            if (keys["w"] || keys["arrowup"]) {
                moveX = Math.cos(player.angle) * player.speed;
                moveY = Math.sin(player.angle) * player.speed;
                isMoving = true;
            }
            if (keys["s"] || keys["arrowdown"]) {
                moveX = -Math.cos(player.angle) * player.speed;
                moveY = -Math.sin(player.angle) * player.speed;
                isMoving = true;
            }

            let newX = player.x + moveX;
            let newY = player.y + moveY;

            // Direct perimeter safety check
            if (!isWall(Math.floor(newX / tileSize), Math.floor(player.y / tileSize))) player.x = newX;
            if (!isWall(Math.floor(player.x / tileSize), Math.floor(newY / tileSize))) player.y = newY;

            if (isMoving) {
                walkCycle += 0.3;
                headBobY = Math.sin(walkCycle) * 6; [1.21]
            } else {
                headBobY = Math.sin(Date.now() * 0.002) * 1;
            }

            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
        }

        function draw() {
            // Clear entire frame cleanly
            ctx.fillStyle = "#0c1015";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Render Sky
            ctx.fillStyle = "#161d26";
            ctx.fillRect(0, 0, canvas.width, canvas.height / 2 + headBobY);

            // Render Floor
            ctx.fillStyle = "#1c1410";
            ctx.fillRect(0, canvas.height / 2 + headBobY, canvas.width, canvas.height / 2 - headBobY);

            const zBuffer = [];
            const numRays = canvas.width;
            const startAngle = player.angle - player.fov / 2;

            // 1. WALL RAYCASTING (Using super stable vector blocks instead of raw arrays)
            for (let i = 0; i < numRays; i++) {
                let rayAngle = startAngle + (i / numRays) * player.fov;
                let distance = 0;
                let hitWall = false;
                let cos = Math.cos(rayAngle), sin = Math.sin(rayAngle);
                let wallX = 0, wallY = 0;

                while (!hitWall && distance < 600) {
                    distance += 2.0;
                    wallX = player.x + cos * distance;
                    wallY = player.y + sin * distance;
                    if (isWall(Math.floor(wallX / tileSize), Math.floor(wallY / tileSize))) hitWall = true;
                }

                let correctedDist = distance * Math.cos(rayAngle - player.angle);
                zBuffer[i] = correctedDist;

                let wallHeight = (tileSize * canvas.height) / correctedDist;
                if (wallHeight > canvas.height) wallHeight = canvas.height;
                
                let wallTop = (canvas.height / 2) - (wallHeight / 2) + headBobY;

                // Lighting drop-off based on ray distance depth calculation
                let shade = Math.floor(180 - (correctedDist * 0.35));
                shade = Math.max(15, Math.min(200, shade));

                // Vertical wall strip fill
                ctx.fillStyle = `rgb(${shade}, ${Math.floor(shade * 0.8)}, ${Math.floor(shade * 0.6)})`;
                ctx.fillRect(i, wallTop, 1, wallHeight);
            }

            // 2. MULTIPLAYER ENEMY SPIRITES
            for (let pId in remotePlayers) {
                let p = remotePlayers[pId];
                let ex = p.x - player.x, ey = p.y - player.y;
                let spriteAngle = Math.atan2(ey, ex) - player.angle;
                while (spriteAngle < -Math.PI) spriteAngle += Math.PI * 2;
                while (spriteAngle > Math.PI) spriteAngle -= Math.PI * 2;

                if (Math.abs(spriteAngle) < player.fov) {
                    let spriteDist = Math.sqrt(ex*ex + ey*ey);
                    let spriteSize = (tileSize * canvas.height) / spriteDist;
                    let screenX = (canvas.width / 2) + Math.tan(spriteAngle) * (canvas.width / 2) - (spriteSize / 2);
                    let screenY = (canvas.height / 2) - (spriteSize / 2) + headBobY;
                    let checkColumn = Math.floor(screenX + spriteSize / 2);

                    if (checkColumn >= 0 && checkColumn < canvas.width && spriteDist < zBuffer[checkColumn]) {
                        ctx.fillStyle = p.shooting ? "#ff3333" : "#00ffcc";
                        ctx.beginPath();
                        ctx.arc(screenX + spriteSize/2, screenY + spriteSize/2, spriteSize/4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // 3. WEAPON HUD DRAWING
            let gunYOffset = headBobY * 0.6;
            let gunX = canvas.width / 2;
            let gunY = canvas.height - 20 + gunYOffset;

            if (muzzleFlashTimer > 0) {
                ctx.fillStyle = "#ffcc00";
                ctx.beginPath(); ctx.arc(gunX, gunY - 70, 30, 0, Math.PI * 2); ctx.fill();
            }
            ctx.fillStyle = "#34495e"; ctx.fillRect(gunX - 15, gunY - 60, 30, 70);
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(gunX - 6, gunY - 75, 12, 15);

            // 4. FIX MINI-MAP LAYER OVERLAY (Guaranteed rendering)
            const mScale = 10; 
            const mOffset = { x: canvas.width - (mapSize * mScale) - 15, y: 15 };
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(mOffset.x - 4, mOffset.y - 4, (mapSize * mScale) + 8, (mapSize * mScale) + 8);

            for (let y = 0; y < mapSize; y++) {
                for (let x = 0; x < mapSize; x++) {
                    if (isWall(x, y)) {
                        ctx.fillStyle = "#555";
                    } else {
                        ctx.fillStyle = "#222";
                    }
                    ctx.fillRect(mOffset.x + (x * mScale), mOffset.y + (y * mScale), mScale - 1, mScale - 1);
                }
            }

            // Draw player position dot directly inside mini-map coordinate scale
Use code with caution.let pMapX = mOffset.x + (player.x / (mapSize * tileSize)) * (mapSize * mScale);let pMapY = mOffset.y + (player.y / (mapSize * tileSize)) * (mapSize * mScale);ctx.fillStyle = "#ff3366";ctx.beginPath(); ctx.arc(pMapX, pMapY, 3, 0, Math.PI * 2); ctx.fill();}function gameLoop() {update();draw();requestAnimationFrame(gameLoop);}gameLoop();
