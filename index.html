<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unblocked Multiplayer Game</title>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        canvas { background-color: #222; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- Standard HTML5 2D Canvas element (100% immune to WebGL or Flag blocks) -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d"); // Standard 2D rendering layer

        // Local Player coordinates and variables
        const player = { x: 400, y: 300, size: 20, speed: 4, color: "#ff4444" };
        const keys = {};

        // Track user keyboard presses
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // Core Game Logic (Runs 60 times per second)
        function update() {
            if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
            if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
            if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
            if (keys["d"] || keys["arrowright"]) player.x += player.speed;

            // Keep player inside the screen borders
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;
        }

        // Render Graphics to the Canvas
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Wipe the old frame

            // Draw a basic structural floor grid for coordinate alignment
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // Render the local player character onto the screen
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Instructions Overlay text
            ctx.fillStyle = "#fff";
            ctx.font = "16px Arial";
            ctx.fillText("Use WASD or Arrow Keys to move your player block!", 20, 30);
        }

        // Continuous Loop Driver
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop); // Syncs cleanly with the Chromebook monitor refresh rate [1.34]
        }

        // Start the engine
        gameLoop();
    </script>
</body>
</html>
